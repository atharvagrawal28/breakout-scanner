name: Daily Breakout Scan

# Runs every morning and commits a fresh dated Excel + latest.* into results/.
# Streamlit Cloud then serves those results instantly.
on:
  schedule:
    # 03:15 UTC = 08:45 IST, after NSE pre-open. Adjust if needed.
    - cron: "15 3 * * 1-5"
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python run_scan.py

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ data/price_history.parquet
          git commit -m "Daily scan $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
