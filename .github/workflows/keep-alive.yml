name: Keep App Awake

# Streamlit Community Cloud puts an app to sleep after ~12 hours with no visitors.
# This pings the app URL on a schedule so the client always gets an instant load.
#
# SETUP (one time): in your GitHub repo go to
#   Settings -> Secrets and variables -> Actions -> Variables -> New repository variable
#   Name:  STREAMLIT_APP_URL
#   Value: https://your-app-name.streamlit.app   (your deployed URL)
#
# If STREAMLIT_APP_URL is not set, this workflow simply does nothing (no error).

on:
  schedule:
    - cron: "0 */6 * * *"     # every 6 hours
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          URL="${{ vars.STREAMLIT_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "STREAMLIT_APP_URL not set - skipping. (Set it in repo Variables to enable.)"
            exit 0
          fi
          echo "Pinging $URL ..."
          # Hit the app + its health endpoint; -L follows redirects, never fail the job
          curl -sSL --max-time 60 "$URL" -o /dev/null -w "app: %{http_code}\n" || true
          curl -sSL --max-time 60 "${URL%/}/_stcore/health" -o /dev/null -w "health: %{http_code}\n" || true
          echo "Done."
